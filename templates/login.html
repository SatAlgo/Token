{% extends "base.html" %}
{% block title %}Staff login · {{ shop_name }}{% endblock %}
{% block body %}
<div class="mx-auto max-w-sm min-h-full flex flex-col justify-center p-6">
  <div class="text-center mb-6">
    <div class="text-4xl">🔐</div>
    <h1 class="mt-2 text-xl font-bold">Staff login</h1>
    <p class="text-sm text-slate-400">{{ shop_name }} — waiter & admin</p>
  </div>
  <form method="post" action="/login" class="space-y-3">
    <input type="hidden" name="next" value="{{ next }}" />
    <input type="password" name="password" placeholder="Password" autofocus
      class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 focus:outline-none focus:border-emerald-500" />
    {% if request.query_params.get('error') %}
    <p class="text-sm text-rose-400">Wrong password, try again.</p>
    {% endif %}
    <button class="w-full rounded-xl bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-3">
      Log in
    </button>
  </form>
  <a href="/" class="mt-6 text-center text-xs text-slate-500 hover:text-slate-300">← Back to menu</a>
  <button class="theme-toggle mx-auto mt-4 h-9 w-9 rounded-lg bg-slate-800 border border-slate-700 flex items-center justify-center" aria-label="Toggle light/dark" title="Toggle theme">🌙</button>
</div>
{% endblock %}
